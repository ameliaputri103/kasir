<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kasir - Transaksi Berhasil</title>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      background:#f4f4f4;
      height:100vh;
    }

    
    .sidebar{
      width:220px;
      background:white;
      border-right:1px solid #ddd;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:20px 15px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:20px;
      font-weight:bold;
      color:#3498db;
      margin-bottom:40px;
    }

    .logo i{
      background:#3498db;
      color:white;
      padding:10px;
      border-radius:8px;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      color:#333;
      cursor:pointer;
    }

    .menu i{
      font-size:20px;
    }

    .admin-box{
      border:1px solid #ccc;
      border-radius:10px;
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#fafafa;
    }

    .admin-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .admin-left i{
      font-size:24px;
      color:#5dade2;
    }

    
    .main{
      flex:1;
      padding:30px;
      position:relative;
    }

    .title{
      font-size:36px;
      font-weight:bold;
      margin-bottom:30px;
    }

    .content{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .check-icon{
      width:130px;
      height:130px;
      border-radius:50%;
      background:linear-gradient(to bottom right,#73c2fb,#0066ff);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
    }

    .check-icon i{
      color:white;
      font-size:70px;
    }

    .success{
      font-size:42px;
      color:#7ea5c4;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:22px;
      margin-bottom:30px;
    }

    .card{
      width:700px;
      background:white;
      border:1px solid #555;
      border-radius:10px;
      padding:30px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-bottom:30px;
      font-size:22px;
    }

    .status{
      background:#bdefff;
      padding:10px 30px;
      border-radius:10px;
      color:#0b5d1e;
      font-weight:bold;
    }

    .thanks{
      text-align:center;
      margin-top:30px;
      font-size:24px;
      font-weight:500;
    }

    
    .buttons{
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:30px;
    }

    button{
      padding:15px 35px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .btn-print{
      background:white;
      border:1px solid #bbb;
    }

    .btn-new{
      background:white;
      border:1px solid #bbb;
    }

    .btn-dashboard{
      background:#8fd3ff;
    }

    button:hover{
      opacity:0.8;
    }

  </style>
</head>
<body>


  <div class="sidebar">

    <div>
      <div class="logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <span>Kasir</span>
      </div>

      <div class="menu" onclick="window.location.href='dashboard.html'">
        <i class="fa-solid fa-house"></i>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="admin-box">
      <div class="admin-left">
        <i class="fa-solid fa-user"></i>
        <div>
          <div><b>Admin</b></div>
          <div>Kasir</div>
        </div>
      </div>

      <i class="fa-solid fa-angle-down"></i>
    </div>

  </div>


  <div class="main">

    <div class="title">Transaksi</div>

    <div class="content">

      <div class="check-icon">
        <i class="fa-solid fa-check"></i>
      </div>

      <div class="success">Pembayaran Berhasil!</div>

      <div class="subtitle">
        Transaksi telah berhasil diselesaikan
      </div>

      <div class="card">

        <div class="row">
          <span>ID Transaksi</span>
          <span>TRX-2026-00125</span>
        </div>

        <div class="row">
          <span>Waktu Transaksi</span>
          <span>25 Mei 2026, 14:30</span>
        </div>

        <div class="row">
          <span>Metode Pembayaran</span>
          <span>QRIS</span>
        </div>

        <div class="row">
          <span>Status</span>
          <span class="status">Lunas</span>
        </div>

      </div>

      <div class="thanks">
        Terima kasih telah berbelanja<br/>
        Semoga harimu menyenangkan!
      </div>

    </div>

    
    <div class="buttons">

      <button class="btn-print">
        <i class="fa-solid fa-print"></i>
        Cetak Struk
      </button>

      <button class="btn-new">
        + Transaksi Baru
      </button>

      <button class="btn-dashboard" onclick="window.location.href='dashboard.html'">
        <i class="fa-solid fa-table-cells-large"></i>
        Kembali ke Dashboard
      </button>

    </div>

  </div>

</body>
</html>
