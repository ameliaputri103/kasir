<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Kasir</title>

  
 
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:400px;
      background:white;
      padding:40px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .logo{
      text-align:center;
      margin-bottom:10px;
    }

    .logo img{
      width:70px;
    }

    h1{
      text-align:center;
      font-size:48px;
      margin-bottom:10px;
      font-weight:bold;
    }

    .subtitle{
      text-align:center;
      color:#333;
      margin-bottom:40px;
      font-size:18px;
    }

    .form-group{
      margin-bottom:25px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:18px;
    }

    .input-box{
      display:flex;
      align-items:center;
      background:#f1f1f1;
      padding:12px;
      border-radius:4px;
    }

    .input-box i{
      margin-right:10px;
      color:#333;
      font-size:18px;
    }

    .input-box input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
      font-size:18px;
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      font-size:16px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .forgot{
      text-decoration:none;
      color:black;
    }

    .btn-login{
      width:100%;
      padding:14px;
      border:none;
      background:#635BFF;
      color:white;
      font-size:24px;
      border-radius:4px;
      cursor:pointer;
      margin-bottom:15px;
    }

    .btn-login:hover{
      background:#4f46e5;
    }

    .separator{
      text-align:center;
      margin-bottom:15px;
      font-size:18px;
    }

    .btn-admin{
      width:100%;
      padding:14px;
      border:none;
      background:#f1f1f1;
      font-size:20px;
      border-radius:4px;
      cursor:pointer;
    }

    .btn-admin:hover{
      background:#ddd;
    }
  </style>
</head>

<body>



  <div class="container">

    <div class="logo">
      <img src="logo.png.png" alt="Kasir">
    </div>

    <h1>Kasir</h1>
    <p class="subtitle">Silahkan masuk untuk melanjutkan</p>

    <div class="form-group">
      <label>Username</label>

      <div class="input-box">
        <i class="fa-regular fa-user"></i>
        <input type="text" placeholder="Masukan username">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>

      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Masukan password">
      </div>
    </div>

    <div class="options">
      <div class="remember">
        <input type="checkbox">
        <span>Ingat saya</span>
      </div>

      <a href="#" class="forgot">Lupa password?</a>
    </div>

    <button class="btn-login"onclick="window.location.href='dashboard.html'">Masuk</button>

    <div class="separator">atau</div>

    <button class="btn-admin"onclick="window.location.href='dashboard.html'">Masuk sebagai Admin</button>

</button>
  </div>

  

</body>
</html>
