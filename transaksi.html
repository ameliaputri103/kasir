<!DOCTYPE html>
<html lang="id">
<head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f5f5f5;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#fff;
    padding:20px;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:10px;
}

.menu a{
    text-decoration:none;
    color:#333;
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:10px;
}

.menu a:hover{
    background:#4A90E2;
    color:white;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:30px;
    font-size:28px;
    font-weight:bold;
    color:#4A90E2;
}


.logo{
font-size:35px;
font-weight:bold;
color:#4a90e2;
margin-bottom:40px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
text-decoration:none;
color:black;
border-radius:10px;
}

.menu a:hover{
background:#4a90e2;
color:white;
}

.main{
flex:1;
padding:20px;
}

h1{
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.product{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
}

.product img{
width:80px;
height:80px;
object-fit:contain;
}

.product:hover{
transform:scale(1.03);
}

.cart{
width:350px;
background:white;
padding:20px;
border-left:1px solid #ddd;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
}

.qty-btn{
padding:3px 10px;
cursor:pointer;
}

.total{
margin-top:20px;
}

button.bayar{
width:100%;
padding:15px;
background:#1976d2;
color:white;
border:none;
border-radius:10px;
margin-top:20px;
cursor:pointer;
}
</style>

</head>
<body>



<div class="sidebar">

    <div class="logo">
        <img src="bag.png" width="50">
        <span>Kasir</span>
    </div>

    <ul class="menu">

        <li>
            <a href="dashboard.html">
                <i class="fas fa-home"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="transaksi.html">
                <i class="fas fa-cart-shopping"></i>
                Transaksi
            </a>
        </li>

        <li>
            <a href="produk.html">
                <i class="fas fa-box"></i>
                Produk
            </a>
        </li>

        <li>
            <a href="laporan.html">
                <i class="fas fa-chart-line"></i>
                Laporan
            </a>
        </li>

        <li>
            <a href="pelanggan.html">
                <i class="fas fa-users"></i>
                Pelanggan
            </a>
        </li>

        <li>
            <a href="pengaturan.html">
                <i class="fas fa-gear"></i>
                Pengaturan
            </a>
        </li>

    </ul>

</div>
</div>
</div>

<div class="main">

<h1>Transaksi</h1>

<div class="products">

<div class="product" onclick="tambahProduk('Sprite',5000)">
<img src="spite.png.png">
<h3>Sprite</h3>
<p>Rp5.000</p>
</div>

<div class="product" onclick="tambahProduk('Indomie',4000)">
<img src="indomie.png.png">
<h3>Indomie</h3>
<p>Rp4.000</p>
</div>

<div class="product" onclick="tambahProduk('Coca Cola',10000)">
<img src="cola.png.png">
<h3>Coca Cola</h3>
<p>Rp10.000</p>
</div>

<div class="product" onclick="tambahProduk('Cheetos',8000)">
<img src="cheetos.png.png">
<h3>Cheetos</h3>
<p>Rp8.000</p>
</div>

<div class="product" onclick="tambahProduk('Air Putih',5000)">
<img src="air.png.png">
<h3>Air Putih</h3>
<p>Rp5.000</p>
</div>

<div class="product" onclick="tambahProduk('Oreo',6000)">
<img src="oreo.png.png">
<h3>Oreo</h3>
<p>Rp6.000</p>
</div>

</div>

</div>

<div class="cart">

<h2>Keranjang</h2>
<hr><br>

<div id="cart-items"></div>

<div class="total">
<p>Subtotal : Rp.<span id="subtotal">0</span></p>

<br>

<label>Diskon (%)</label>
<input type="number" id="diskon" value="0" oninput="updateCart()">

<br><br>

<h3>Total : Rp.<span id="total">0</span></h3>

<button class="bayar"class="btn-save"onclick="window.location.href='hasiltransaksi.html'"
style="background:rgb(101, 157, 209);margin-top:10px"
onclick="Bayar()">
BAYAR
 <button class=></button>

</button>
   

<button class="bayar"
style="background:red;margin-top:10px"
onclick="hapusSemua()">
HAPUS SEMUA
</button>

</div>

</div>

<script>

let keranjang=[];

function tambahProduk(nama,harga){

let item=keranjang.find(p=>p.nama===nama);

if(item){
item.qty++;
}else{
keranjang.push({
nama:nama,
harga:harga,
qty:1
});
}

updateCart();
}

function tambahQty(index){
keranjang[index].qty++;
updateCart();
}

function kurangQty(index){

keranjang[index].qty--;

if(keranjang[index].qty<=0){
keranjang.splice(index,1);
}

updateCart();
}

function updateCart(){

let cart=document.getElementById("cart-items");

cart.innerHTML="";

let subtotal=0;

keranjang.forEach((item,index)=>{

subtotal+=item.harga*item.qty;

cart.innerHTML+=`
<div class="cart-item">

<div>
<b>${item.nama}</b><br>
Rp.${item.harga}
</div>

<div>
<button class="qty-btn"
onclick="kurangQty(${index})">-</button>

${item.qty}

<button class="qty-btn"
onclick="tambahQty(${index})">+</button>
</div>

</div>
`;
});

document.getElementById("subtotal").innerText=
subtotal.toLocaleString();

let diskon=
parseInt(document.getElementById("diskon").value)||0;

let total=
subtotal-(subtotal*diskon/100);

document.getElementById("total").innerText=
total.toLocaleString();
}

function bayar(){

if(keranjang.length===0){
alert("Keranjang kosong!");
return;
}

alert("Pembayaran berhasil!");

keranjang=[];

updateCart();
}

function hapusSemua(){
keranjang=[];
updateCart();
}

</script>

</body>
</html>
